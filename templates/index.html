{% extends 'base.html' %}

{% block title %}Cadastro EBD{% endblock %}

{% block content %}
<h2 class="mb-4">Cadastro de Professores e Alunos</h2>

<!-- Alteramos o action para "/" para que os dados sejam enviados para a rota já definida no app.py -->
<form method="POST" action="/">
    <!-- Informações Pessoais -->
    <fieldset class="border p-3 mb-3">
        <legend>Informações Pessoais</legend>
        <div class="mb-2">
            <label>Nome Completo:</label>
            <input type="text" name="nome" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>CPF:</label>
            <input type="text" name="cpf" class="form-control" required>
        </div>
        <div class="mb-2">
            <!-- Alterado o name para "nascimento" para ficar compatível com o app.py -->
            <label>Data de Nascimento:</label>
            <input type="date" name="nascimento" class="form-control" required>
        </div>
        <div class="mb-2">
            <label>Email:</label>
            <input type="email" name="email" class="form-control">
        </div>
        <div class="mb-2">
            <label>Telefone:</label>
            <input type="text" name="telefone" class="form-control">
        </div>
    </fieldset>

    <!-- Informações Acadêmicas -->
    <fieldset class="border p-3 mb-3">
        <legend>Informações Acadêmicas</legend>
        <div class="mb-2">
            <label>Matrícula:</label>
            <input type="text" name="matricula" class="form-control">
        </div>
        <div class="mb-2">
            <label>Curso:</label>
            <input type="text" name="curso" class="form-control">
        </div>
        <div class="mb-2">
            <label>Sala:</label>
            <input type="text" name="sala" class="form-control">
        </div>
        <div class="mb-2">
            <label>Ano de Ingresso:</label>
            <input type="text" name="ano_ingresso" class="form-control">
        </div>
    </fieldset>

    <!-- Endereço -->
    <fieldset class="border p-3 mb-3">
        <legend>Endereço</legend>
        <div class="mb-2">
            <label>CEP:</label>
            <input type="text" name="cep" class="form-control">
        </div>
        <div class="mb-2">
            <label>Rua:</label>
            <input type="text" name="rua" class="form-control">
        </div>
        <div class="mb-2">
            <label>Número:</label>
            <input type="text" name="numero" class="form-control">
        </div>
        <div class="mb-2">
            <label>Complemento:</label>
            <input type="text" name="complemento" class="form-control">
        </div>
        <div class="mb-2">
            <label>Bairro:</label>
            <input type="text" name="bairro" class="form-control">
        </div>
        <div class="mb-2">
            <label>Cidade:</label>
            <input type="text" name="cidade" class="form-control">
        </div>
        <div class="mb-2">
            <label>Estado:</label>
            <input type="text" name="estado" class="form-control">
        </div>
    </fieldset>

    <button type="submit" class="btn btn-success">Salvar</button>
    <a href="/" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
