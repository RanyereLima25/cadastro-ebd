<!DOCTYPE html>
<html>
<head>
    <title>Lista de Pessoas</title>
</head>
<body>
    <h1>Pessoas Cadastradas</h1>
    <a href="/cadastro">Cadastrar Nova Pessoa</a>
    <ul>
        {% for pessoa in pessoas %}
        <li>{{ pessoa.nome }} - {{ pessoa.email }}</li>
        {% endfor %}
    </ul>
</body>
</html>
