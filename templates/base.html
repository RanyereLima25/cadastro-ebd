<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema EBD{% endblock %}</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<!-- Navbar padrão -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">EBD - Área 01</a>
        <div>
            <a class="btn btn-light me-2" href="/">Cadastro</a>
            <a class="btn btn-light me-2" href="/visualizar">Visualizar</a>
            <a class="btn btn-light me-2" href="/relatorios">Relatórios</a>
            <a class="btn btn-light" href="/graficos">Gráficos</a>
        </div>
    </div>
</nav>

<!-- Conteúdo principal -->
<div class="container">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js (somente usado nos gráficos) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
