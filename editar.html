{% extends 'base.html' %}

{% block title %}Editar Cadastro{% endblock %}

{% block content %}
<h2 class="mb-4">Editar Cadastro</h2>

<form method="POST">
    <div class="mb-3">
        <label for="nome" class="form-label">Nome:</label>
        <input type="text" class="form-control" name="nome" value="{{ pessoa.nome }}" required>
    </div>
    <div class="mb-3">
        <label for="cpf" class="form-label">CPF:</label>
        <input type="text" class="form-control" name="cpf" value="{{ pessoa.cpf }}" required>
    </div>
    <div class="mb-3">
        <label for="curso" class="form-label">Curso:</label>
        <input type="text" class="form-control" name="curso" value="{{ pessoa.curso }}" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email:</label>
        <input type="email" class="form-control" name="email" value="{{ pessoa.email }}" required>
    </div>
    <div class="mb-3">
        <label for="telefone" class="form-label">Telefone:</label>
        <input type="text" class="form-control" name="telefone" value="{{ pessoa.telefone }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Salvar</button>
    <a href="/visualizar" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
